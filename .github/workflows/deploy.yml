name: Deploy

on:
  push:
    branches: [main]

jobs:
  # ── Deploy Spring Boot to Render ────────────────────────────────────────────
  deploy-backend:
    name: Deploy Spring Boot → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" | \
          python3 -c "import sys,json; d=json.load(sys.stdin); print('Deploy triggered:', d.get('deploy', {}).get('id', 'unknown'))"

  # ── Deploy React to Vercel ──────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy React → Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend  # ← adjust to your React folder name
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --env REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
